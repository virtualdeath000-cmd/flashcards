<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hive_cards</title>
<meta name="apple-mobile-web-app-title" content="Hive_cards">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0F0000">
<link rel="apple-touch-icon" href="./Hive_Cards2.png">
<link rel="icon" type="image/png" href="./Hive_Cards2.png">
<style>
  @font-face {
    font-family: 'Turret Road';
    src: url('./Hivecard_fonts/Turret_Road/TurretRoad-Regular.ttf') format('truetype');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'Turret Road';
    src: url('./Hivecard_fonts/Turret_Road/TurretRoad-Medium.ttf') format('truetype');
    font-weight: 500; font-display: swap;
  }
  @font-face {
    font-family: 'Turret Road';
    src: url('./Hivecard_fonts/Turret_Road/TurretRoad-Bold.ttf') format('truetype');
    font-weight: 700; font-display: swap;
  }
  /* Blinker — the readable font for USER-TYPED text (card content + inputs). */
  @font-face {
    font-family: 'Blinker';
    src: url('./Hivecard_fonts/Blinker/Blinker-Regular.ttf') format('truetype');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'Blinker';
    src: url('./Hivecard_fonts/Blinker/Blinker-Bold.ttf') format('truetype');
    font-weight: 700; font-display: swap;
  }
  :root {
    --bg: #0F0000;
    --fg: #FFFFFF;
    --surface: #B87FB2;
    --surface-fg: #FFFFFF;
    --primary: #FFB5FA;
    --primary-fg: #4a1a45;
    --primary-active: #ec9ce6;
    --danger: #FF5500;
    --danger-fg: #FFFFFF;
    --danger-active: #cc4400;
    --input-bg: #0D0D0D;
    --input-fg: #FFFFFF;
    --input-border: #1f1f1f;
    --btn: #2a2a32;
    --btn-fg: #FFFFFF;
    --btn-active: #3a3a44;
    --ghost-active: #1f1f26;
    --play-card: #1c1c22;
    --play-card-back: #232330;
    /* Readable font for the USER TEXT (card front/back content + typed inputs).
       Everything else uses the Turret Road display font (loaded above). */
    --user-font: 'Blinker', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Turret Road', system-ui, sans-serif;
    line-height: 1.3;  /* headroom so the display font's glyphs don't clip */
    background: var(--bg); color: var(--fg);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
    -webkit-overflow-scrolling: touch;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
  h1 { font-size: 22px; margin: 8px 0 16px; font-weight: 600; letter-spacing: -0.3px; }
  h2 { font-size: 18px; margin: 0; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .grow { flex: 1; }
  button, .btn {
    background: var(--btn); color: var(--btn-fg);
    border: none; border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; touch-action: manipulation;
    font-family: inherit;
  }
  button:active { background: var(--btn-active); }
  .btn-primary { background: var(--primary); color: var(--primary-fg); }
  .btn-primary:active { background: var(--primary-active); }
  .btn-danger { background: var(--danger); color: var(--danger-fg); }
  .btn-danger:active { background: var(--danger-active); }
  .btn-ghost { background: transparent; padding: 8px 10px; }
  .btn-ghost:active { background: var(--ghost-active); }
  .btn-small { padding: 8px 12px; font-size: 14px; }
  button:disabled { opacity: 0.3; }
  /* Drag-and-drop deck reordering (pointer-events based, works on iOS touch). */
  .drag-handle {
    flex: 0 0 auto; align-self: stretch;
    display: flex; align-items: center; justify-content: center;
    width: 30px; margin: -14px 0 -14px -6px;   /* fill the card's vertical padding for a big touch target */
    font-size: 20px; line-height: 1; letter-spacing: -2px;
    color: var(--surface-fg); opacity: 0.55;
    cursor: grab; touch-action: none;           /* stop iOS scrolling from stealing the drag */
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
  }
  .drag-handle:active { cursor: grabbing; opacity: 0.9; }
  .deck-card.drag-source { opacity: 0.35; }
  .deck-drag-ghost {
    position: fixed; left: 0; top: 0; z-index: 300; margin: 0;
    pointer-events: none; opacity: 0.96;
    box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    will-change: transform;
  }
  .drop-indicator {
    height: 4px; margin: 0 2px; border-radius: 3px;
    background: var(--primary); box-shadow: 0 0 8px var(--primary);
  }
  /* Folder rows in the deck list (same shape as a deck card + a chevron). */
  .folder-card {
    background: var(--surface); color: var(--surface-fg);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .folder-card .info { flex: 1; min-width: 0; }
  .folder-card .info > div:first-child {
    font-weight: 600; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .folder-card .meta { font-size: 13px; margin-top: 2px; }
  .folder-card .chev { font-size: 22px; opacity: 0.5; padding-right: 2px; }
  /* A deck dragged onto a folder highlights it as the drop target. */
  .folder-card.drop-into { outline: 2px solid var(--primary); outline-offset: 2px; box-shadow: 0 0 12px var(--primary); }
  /* Small "Move" chip on each deck card in the list, mirroring the detail-view button. */
  .deck-move-btn {
    padding: 6px 10px; font-size: 12px; border-radius: 8px;
    background: var(--btn); color: var(--btn-fg);
    flex: 0 0 auto;
  }
  .icon-btn {
    width: 40px; height: 40px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  input, textarea {
    width: 100%;
    background: var(--input-bg); color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-family: var(--user-font);
    -webkit-user-select: text; user-select: text;
  }
  textarea { resize: none; min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .deck-card {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .deck-card .meta { font-size: 13px; color: var(--surface-fg); margin-top: 2px; }
  .deck-card .info { flex: 1; min-width: 0; }
  .deck-card .info > div:first-child {
    font-weight: 600; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-item {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  /* Front | Back arranged side-by-side (was stacked vertically). Each half
     wraps its own label+text so they stay grouped; min-width:0 lets long
     content ellipsis-wrap inside its column instead of blowing out the row. */
  .card-item .sides { flex: 1; min-width: 0; font-size: 14px; display: flex; gap: 24px; }
  .card-item .side { flex: 1 1 0; min-width: 0; }
  .card-item .side-label { color: var(--surface-fg); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-item .side-text { margin: 2px 0 0; word-wrap: break-word; font-family: var(--user-font); }
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--fg);
  }
  .fab-row {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .fab-row button { flex: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 560px;
  }
  .modal h3 { margin: 0 0 14px; font-size: 20px; color: var(--surface-fg); }
  .modal .actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal .actions button { flex: 1; }
  .modal textarea { min-height: 120px; font-size: 17px; }
  .add-another {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 22px;
    font-weight: 700;
    background: var(--primary);
    color: var(--primary-fg);
  }
  .add-another:active { background: var(--primary-active); }
  #modal-ok, #modal-cancel { background: var(--primary); color: var(--primary-fg); }
  #modal-ok:active, #modal-cancel:active { background: var(--primary-active); }
  .top-corner-actions {
    display: flex; gap: 8px;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .top-corner-actions button {
    padding: 8px 14px;
    font-size: 14px;
    background: var(--play-card);
  }

  /* Play view */
  .play-card {
    background: var(--play-card);
    border-radius: 18px;
    min-height: 60vh;
    padding: 24px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    cursor: pointer; touch-action: manipulation;
  }
  .play-card.back { background: var(--play-card-back); }
  .play-card-text {
    width: 100%; max-width: 100%;
    text-align: center;
    font-family: var(--user-font);
    font-size: 22px; line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    -webkit-user-select: none; user-select: none;
  }
  .progress {
    text-align: center; color: var(--fg); font-size: 14px; margin: 12px 0;
  }
  .play-controls { display: flex; gap: 10px; margin-top: 16px; }
  .play-controls button { flex: 1; padding: 16px; font-size: 17px; }
  .practice-box {
    margin-top: 12px;
    min-height: 90px;
  }
  .toggle-on { background: var(--primary) !important; color: var(--primary-fg); }

  .hidden { display: none !important; }
  .menu {
    display: flex; gap: 6px;
  }
  .file-input { display: none; }
  .pill {
    font-size: 12px; padding: 3px 8px; border-radius: 8px;
    background: var(--btn); color: var(--btn-fg);
  }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--btn); color: var(--btn-fg);
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 200;
  }
  .toast.show { opacity: 1; }
  .theme-row {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: var(--primary-fg);
    text-align: left;
    font-size: 15px;
    font-weight: 700;
  }
  .theme-row:active { background: var(--primary-active); }
  .theme-row.theme-current { background: var(--primary-active); }
</style>
<script>
  // Apply the saved theme's colors before first paint to avoid a flash of the
  // default (Flower) palette. Uses the vars cached by applyTheme on the last visit.
  (function(){
    try {
      var v = JSON.parse(localStorage.getItem("flashcards.themeVars.v1"));
      if (v) for (var k in v) document.documentElement.style.setProperty(k, v[k]);
    } catch(e){}
  })();
</script>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "flashcards.v1";
  const TOMB_TTL_MS = 90 * 24 * 60 * 60 * 1000;

  // --- State ---
  let state = loadState();
  let currentDeckId = null;
  let currentFolderId = null;   // null = top level; otherwise the open folder's id
  let play = null; // {order:[idx], pos:0, side:'front'}

  function emptyState(){ return { folders: [], folderTomb: {}, decks: [], deckTomb: {} }; }
  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return emptyState();
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.decks)) return emptyState();
      return migrateState(parsed);
    } catch(e){ return emptyState(); }
  }
  function saveState(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ toast("Couldn't save — storage full?"); }
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function getDeck(id){ return state.decks.find(d => d.id === id); }
  function getFolder(id){ return state.folders.find(f => f.id === id); }
  // A deck is "loose" (top level) if it has no folder, or its folder is gone.
  function deckIsLoose(d){ return !d.folderId || !getFolder(d.folderId); }
  function touch(deck){ if (deck) deck.updated = Date.now(); }

  // --- Schema migration + card-level merge -------------------------------
  // Older data stored cards as bare {front, back}. For reliable cross-device
  // sync each card needs a stable id and an 'updated' time, and each deck a
  // tombstone map of deleted card ids -> when. migrateState backfills all of
  // this in place. Legacy cards get a content-derived id so two devices that
  // were already in sync produce the SAME id (avoids duplicates on first merge).
  function hashStr(s){
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = (((h << 5) + h) + s.charCodeAt(i)) | 0;
    return (h >>> 0).toString(36);
  }
  function migrateCard(c, fallbackTs){
    if (!c || typeof c !== "object") return null;
    const front = String(c.front || "");
    const back = String(c.back || "");
    return {
      id: c.id || ("c" + hashStr(front + "" + back)),
      front, back,
      updated: c.updated || fallbackTs || Date.now()
    };
  }
  // Tombstones only need to live long enough for every device to sync past the
  // deletion. After this window they're pruned so they can't accumulate forever.
  // Trade-off: a device offline longer than this may miss a deletion.
  function pruneTomb(tomb, cutoff){
    if (!tomb) return;
    for (const id in tomb){ if ((tomb[id] || 0) < cutoff) delete tomb[id]; }
  }

  function migrateState(s){
    if (!s || !Array.isArray(s.decks)) return emptyState();
    const cutoff = Date.now() - TOMB_TTL_MS;
    // Folders: newer field than decks; older data won't have it. Keep each
    // deck's folderId as-is (a dangling ref just renders as loose) so a pending
    // sync can still reunite the deck with a folder that lives on another device.
    if (!Array.isArray(s.folders)) s.folders = [];
    s.folders = s.folders.filter(f => f && f.id).map(f => ({
      id: f.id, name: String(f.name || "Folder"),
      created: f.created || Date.now(), updated: f.updated || f.created || Date.now()
    }));
    if (!s.folderTomb || typeof s.folderTomb !== "object") s.folderTomb = {};
    pruneTomb(s.folderTomb, cutoff);
    s.decks.forEach(d => {
      if (!d) return;
      d.folderId = (d.folderId != null && d.folderId !== "") ? String(d.folderId) : undefined;
      if (!Array.isArray(d.cards)) d.cards = [];
      const fb = d.updated || d.created || Date.now();
      const used = new Set();
      d.cards = d.cards.map(c => migrateCard(c, fb)).filter(Boolean).map(card => {
        // Disambiguate identical-content legacy cards so a later merge can't
        // collapse two real cards into one. Deterministic per position, so two
        // devices holding the same deck still agree on the ids.
        let id = card.id, n = 1;
        while (used.has(id)) id = card.id + "~" + (n++);
        used.add(id);
        card.id = id;
        return card;
      });
      if (!d.cardTomb || typeof d.cardTomb !== "object") d.cardTomb = {};
      pruneTomb(d.cardTomb, cutoff);
      if (!d.created) d.created = fb;
      if (!d.updated) d.updated = fb;
    });
    if (!s.deckTomb || typeof s.deckTomb !== "object") s.deckTomb = {};
    pruneTomb(s.deckTomb, cutoff);
    return s;
  }

  // Merge one deck that exists on both sides: union of cards by id (newer
  // 'updated' wins on conflict), with tombstones so a delete on one device
  // isn't undone by a stale copy on the other.
  function mergeOneDeck(ld, rd){
    const tomb = {};
    [ld.cardTomb, rd.cardTomb].forEach(t => {
      if (t) for (const id in t){ const ts = t[id] || 0; if (ts > (tomb[id] || 0)) tomb[id] = ts; }
    });
    const byId = new Map();
    (ld.cards || []).forEach(c => byId.set(c.id, c));
    (rd.cards || []).forEach(c => {
      const ex = byId.get(c.id);
      if (!ex || (c.updated || 0) >= (ex.updated || 0)) byId.set(c.id, c);
    });
    const cards = [];
    byId.forEach((card, id) => {
      const delTs = tomb[id] || 0;
      if (delTs > (card.updated || 0)) return;   // deletion is newer -> stays deleted
      if (id in tomb) delete tomb[id];           // edit beats an older delete -> revive
      cards.push(card);
    });
    const rdNewer = (rd.updated || 0) >= (ld.updated || 0);
    return {
      id: ld.id,
      name: rdNewer ? rd.name : ld.name,
      folderId: rdNewer ? rd.folderId : ld.folderId,   // folder assignment follows the newer edit
      created: Math.min(ld.created || Date.now(), rd.created || Date.now()),
      updated: Math.max(ld.updated || 0, rd.updated || 0),
      cards,
      cardTomb: tomb
    };
  }
  // Merge the folder lists: union by id (newer 'updated' wins), honouring
  // folder tombstones so a deleted folder isn't resurrected by a stale copy.
  function mergeFolders(local, remote){
    const folderTomb = {};
    [local.folderTomb, remote.folderTomb].forEach(t => {
      if (t) for (const id in t){ const ts = t[id] || 0; if (ts > (folderTomb[id] || 0)) folderTomb[id] = ts; }
    });
    const byId = new Map((local.folders || []).map(f => [f.id, f]));
    (remote.folders || []).forEach(rf => {
      const ex = byId.get(rf.id);
      if (!ex || (rf.updated || 0) >= (ex.updated || 0)) byId.set(rf.id, rf);
    });
    const folders = [];
    const seen = new Set();
    const keep = (f) => {
      if (!f || !f.id || seen.has(f.id)) return;
      seen.add(f.id);
      const delTs = folderTomb[f.id] || 0;
      if (delTs > (f.updated || 0)) return;            // deletion is newer -> stays deleted
      if (f.id in folderTomb) delete folderTomb[f.id]; // edited after delete -> revive
      folders.push(f);
    };
    (remote.folders || []).forEach(rf => rf && keep(byId.get(rf.id)));
    (local.folders || []).forEach(lf => lf && keep(byId.get(lf.id)));
    return { folders, folderTomb };
  }
  // Both inputs must already be migrated. Merges folders + decks (card-by-card),
  // honouring tombstones so a delete on one device isn't undone by a stale copy
  // on the other. Returns { folders, folderTomb, decks, deckTomb }.
  function mergeStates(local, remote){
    const { folders, folderTomb } = mergeFolders(local, remote);
    const deckTomb = {};
    [local.deckTomb, remote.deckTomb].forEach(t => {
      if (t) for (const id in t){ const ts = t[id] || 0; if (ts > (deckTomb[id] || 0)) deckTomb[id] = ts; }
    });
    const localById = new Map((local.decks || []).map(d => [d.id, d]));
    const merged = [];
    const seen = new Set();
    const keep = (deck) => {
      const delTs = deckTomb[deck.id] || 0;
      if (delTs > (deck.updated || 0)) return;       // deck deletion is newer -> stays deleted
      if (deck.id in deckTomb) delete deckTomb[deck.id]; // deck edited after delete -> revive
      merged.push(deck);
    };
    (remote.decks || []).forEach(rd => {
      if (!rd || !rd.id || !Array.isArray(rd.cards)) return;
      seen.add(rd.id);
      const ld = localById.get(rd.id);
      keep(ld ? mergeOneDeck(ld, rd) : rd);
    });
    (local.decks || []).forEach(ld => { if (!seen.has(ld.id)) keep(ld); });
    return { folders, folderTomb, decks: merged, deckTomb };
  }
  // Order-independent fingerprint of a whole state, used to tell whether a merge
  // actually changed anything (so Push can warn before pulling in remote edits).
  function stateSignature(st){
    return JSON.stringify({
      dtomb: st.deckTomb || {},
      ftomb: st.folderTomb || {},
      folders: (st.folders || []).map(f => [f.id, f.name, f.updated])
                                 .sort((a, b) => a[0] < b[0] ? -1 : 1),
      decks: (st.decks || []).map(d => ({
        id: d.id, name: d.name, folderId: d.folderId || null, updated: d.updated, ctomb: d.cardTomb || {},
        cards: (d.cards || []).map(c => [c.id, c.updated, c.front, c.back])
                              .sort((a, b) => a[0] < b[0] ? -1 : 1)
      })).sort((a, b) => a.id < b.id ? -1 : 1)
    });
  }

  // --- DOM helpers ---

  function esc(s){

  }

  // --- Toast ---
  let toastTimer;
  function toast(msg){
    const t = $("toast");
    t.textContent = msg;

  // --- Modal ---
  let modalResolve = null;
  function openModal({title, body, okText="OK", cancelText="Cancel", showCancel=true}){
    return new Promise(resolve => {
      $("modal-title").textContent = title;
      $("modal-body").innerHTML = body;
      $("modal-ok").textContent = okText;
      $("modal-ok").classList.toggle("btn-save-close", okText === "Save & Close");
      $("modal-cancel").textContent = cancelText;
      $("modal-cancel").style.display = showCancel ? "" : "none";
      $("modal").classList.add("show");
      modalResolve = resolve;
      // Autofocus first input
      setTimeout(() => {
        const first = $("modal-body").querySelector("input,textarea");
        if (first) first.focus();
      }, 50);
    });
  }
  function closeModal(result){
    $("modal").classList.remove("show");
    if (modalResolve){ const r = modalResolve; modalResolve = null; r(result); }
  }
  function collectAndClose(extra){
    const inputs = {};
    $("modal-body").querySelectorAll("[data-field]").forEach(el => {
      inputs[el.dataset.field] = el.value;
    });
    closeModal(Object.assign({ ok: true, values: inputs }, extra || {}));
  }
  $("modal-ok").addEventListener("click", () => collectAndClose());
  $("modal-cancel").addEventListener("click", () => closeModal({ ok: false }));
  let _modalDownOnOverlay = false;
  $("modal").addEventListener("pointerdown", (e) => {
    _modalDownOnOverlay = (e.target.id === "modal");
  });
  $("modal").addEventListener("click", (e) => {
    if (e.target.id === "modal" && _modalDownOnOverlay) closeModal({ ok: false });
  });
  $("modal-body").addEventListener("click", (e) => {
    const btn = e.target.closest('[data-action="add-another"]');

  async function promptText({title, label, value="", placeholder="", multiline=false}){
    const id = "f_" + Math.random().toString(36).slice(2);
    const body = `
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin-bottom:6px;">${esc(label)}</label>
      ${multiline
        ? `<textarea data-field="${id}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
        : `<input data-field="${id}" type="text" placeholder="${esc(placeholder)}" value="${esc(value)}">`}
    `;
    const result = await openModal({title, body});
    if (!result.ok) return null;
    return result.values[id];
  }

  async function promptCard({title, front="", back="", allowAddAnother=false}){
    const idF = "front_" + Math.random().toString(36).slice(2);
    const idB = "back_" + Math.random().toString(36).slice(2);
    const extra = allowAddAnother
      ? `<button class="add-another" data-action="add-another" type="button">+</button>`
      : "";
    const body = `
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin-bottom:6px;">Front</label>
      <textarea data-field="${idF}" placeholder="Question / prompt">${esc(front)}</textarea>
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin:12px 0 6px;">Back</label>
      <textarea data-field="${idB}" placeholder="Answer">${esc(back)}</textarea>
      ${extra}
    `;
    const result = await openModal({title, body, okText:"Save & Close"});
    if (!result.ok) return null;
    return {
      front: result.values[idF].trim(),
      back: result.values[idB].trim(),

  async function confirm(message){
    const body = `<div style="font-size:15px;color:var(--surface-fg);">${esc(message)}</div>`;
    const result = await openModal({title:"Confirm", body, okText:"Yes", cancelText:"Cancel"});
    return result.ok;

  // --- Render: decks + folders ---
  function renderDecks(){
    const list = $("deck-list");
    // If the open folder was deleted (e.g. via sync), fall back to the top level.
    if (currentFolderId && !getFolder(currentFolderId)) currentFolderId = null;
    const inFolder = !!currentFolderId;

    // Swap the header (Hive_cards title vs. folder title + back/rename/delete)
    // and hide "New Folder" while inside a folder (no nested folders).
    $("decks-top").classList.toggle("hidden", inFolder);
    $("folder-head").classList.toggle("hidden", !inFolder);
    $("btn-new-folder").classList.toggle("hidden", inFolder);
    if (inFolder) $("folder-title").textContent = getFolder(currentFolderId).name;

    const grip = `<div class="drag-handle" data-action="drag" aria-label="Drag to reorder" title="Drag to reorder">⠿</div>`;
    let html = "";
    if (!inFolder){
      // Folders first (each with its deck count + a chevron), then loose decks.
      html += state.folders.map(f => {
        const n = state.decks.filter(d => d.folderId === f.id).length;
        return `
        <div class="folder-card" data-id="${f.id}">
          ${grip}
          <div class="info" data-action="open-folder">
            <div>📁 ${esc(f.name)}</div>
            <div class="meta">${n} deck${n===1?"":"s"}</div>
          </div>
          <span class="chev">›</span>
        </div>`;
      }).join("");
    }
    const decks = state.decks.filter(d => inFolder ? d.folderId === currentFolderId : deckIsLoose(d));
    html += decks.map(d => `
      <div class="deck-card" data-id="${d.id}">
        ${grip}
        <div class="info" data-action="open">
          <div>${esc(d.name)}</div>
          <div class="meta">${d.cards.length} card${d.cards.length===1?"":"s"}</div>
        </div>
        <button class="deck-move-btn" data-action="move" aria-label="Move deck">Move</button>
        <span class="pill" data-action="open">${d.cards.length}</span>
      </div>`).join("");
    list.innerHTML = html;

    list.querySelectorAll(".folder-card").forEach(el => {
      el.addEventListener("click", (e) => {
        if (e.target.closest(".drag-handle")) return;   // grip is for dragging, not opening
        currentFolderId = el.dataset.id;
        renderDecks();
      });
    });
    list.querySelectorAll(".deck-card").forEach(el => {
      el.addEventListener("click", (e) => {
        if (e.target.closest(".drag-handle")) return;
        // The Move button on the card opens the picker in-place (without navigating
        // into the deck); everything else in the card opens the deck.
        if (e.target.closest('[data-action="move"]')){
          e.stopPropagation();
          openMoveDeckModal(getDeck(el.dataset.id), () => renderDecks());
          return;
        }
        currentDeckId = el.dataset.id;
        openDeckView();
      });
    });
  }

  // --- Render: deck detail ---
  function openDeckView(){
    const deck = getDeck(currentDeckId);
    if (!deck) return show("view-decks");
    $("deck-title").textContent = deck.name;
    const list = $("card-list");
    if (deck.cards.length === 0){
      list.innerHTML = `<div class="empty">No cards yet</div>`;
    } else {
      list.innerHTML = deck.cards.map((c, i) => `
        <div class="card-item" data-idx="${i}">
          <div class="drag-handle" data-action="drag" aria-label="Drag to reorder" title="Drag to reorder">⠿</div>
          <div class="sides">
            <div class="side">
              <div class="side-label">Front</div>
              <div class="side-text">${esc(c.front) || '<i style="color:var(--surface-fg)">empty</i>'}</div>
            </div>
            <div class="side">
              <div class="side-label">Back</div>
              <div class="side-text">${esc(c.back) || '<i style="color:var(--surface-fg)">empty</i>'}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <button class="btn-small" data-action="edit">Edit</button>
            <button class="btn-small btn-danger" data-action="del">Del</button>
          </div>
        </div>
      `).join("");
      list.querySelectorAll(".card-item").forEach(el => {
        const idx = parseInt(el.dataset.idx, 10);
        el.querySelector('[data-action="edit"]').addEventListener("click", () => editCard(idx));
        el.querySelector('[data-action="del"]').addEventListener("click", () => deleteCard(idx));
      });
    }

  }

  async function editCard(idx){
    const deck = getDeck(currentDeckId);
    const card = deck.cards[idx];
    const result = await promptCard({title:"Edit Card", front:card.front, back:card.back});
    if (!result) return;
    if (!result.front && !result.back){ toast("Card empty — not saved"); return; }
    deck.cards[idx] = { id: card.id, front: result.front, back: result.back, updated: Date.now() };
    touch(deck);
    saveState();
    openDeckView();
  }
  async function deleteCard(idx){
    const ok = await confirm("Delete this card?");
    if (!ok) return;
    const deck = getDeck(currentDeckId);
    const card = deck.cards[idx];
    if (card && card.id){ if (!deck.cardTomb) deck.cardTomb = {}; deck.cardTomb[card.id] = Date.now(); }
    deck.cards.splice(idx,1);
    touch(deck);
    saveState();
    openDeckView();
  }
  // --- Drag-and-drop: reorder folders/decks, and file a deck into a folder ----
  // Pointer Events (not the HTML5 drag API, which never fires for touch on iOS
  // Safari) so one code path drives mouse, pen, and finger. A floating clone
  // tracks the pointer; a glowing line shows the drop slot, OR a folder lights
  // up when a deck is dropped onto it. The list edge-scrolls while dragging.
  // `touch-action:none` on .drag-handle (CSS) stops iOS turning it into a scroll.
  let deckDrag = null;

  function positionGhost(x, y){
    if (deckDrag) deckDrag.ghost.style.transform =
      `translate(${x - deckDrag.offX}px, ${y - deckDrag.offY}px)`;
  }

  function clearFolderHighlight(){
    document.querySelectorAll(".folder-card.drop-into").forEach(el => el.classList.remove("drop-into"));
  }

  // Work out the drop target under the pointer: a deck dropped onto a folder
  // files it there; otherwise show the reorder line among same-kind siblings.
  function updateDrop(x, y){
    clearFolderHighlight();
    deckDrag.dropInto = null;
    if (deckDrag.kind === "deck"){
      const under = document.elementFromPoint(x, y);   // ghost is pointer-events:none
      const fc = under && under.closest(".folder-card");
      if (fc){
        fc.classList.add("drop-into");
        deckDrag.dropInto = fc.dataset.id;
        if (deckDrag.indicator.parentNode) deckDrag.indicator.remove();
        return;
      }
    }
    placeIndicator(y);
  }

  // Move the drop line to the gap the pointer is over, kept within the dragged
  // item's own section (folders reorder among folders, decks among decks).
  function placeIndicator(y){
    const list = $("deck-list");
    const sel = deckDrag.kind === "folder" ? ".folder-card:not(.drag-source)" : ".deck-card:not(.drag-source)";
    const cards = [...list.querySelectorAll(sel)];
    let ref = null;
    for (const c of cards){
      const r = c.getBoundingClientRect();
      if (y < r.top + r.height / 2){ ref = c; break; }
    }
    if (ref) list.insertBefore(deckDrag.indicator, ref);
    else if (cards.length) list.insertBefore(deckDrag.indicator, cards[cards.length - 1].nextSibling);
    else list.appendChild(deckDrag.indicator);
  }

  // Runs every frame during a drag; scrolls the page when near the top/bottom.
  function deckDragScrollTick(){
    if (!deckDrag) return;
    if (deckDrag.moved){
      const y = deckDrag.lastY, margin = 70, step = 11;
      let d = 0;
      if (y < margin) d = -step;
      else if (y > window.innerHeight - margin) d = step;
      if (d){ window.scrollBy(0, d); updateDrop(deckDrag.lastX, y); }
    }
    deckDrag.raf = requestAnimationFrame(deckDragScrollTick);
  }

  function startDeckDrag(e){
    if (deckDrag) return;   // a drag is already in flight — ignore multi-touch/race pointerdowns
    const handle = e.target.closest(".drag-handle");
    if (!handle || (e.button && e.button > 0)) return;   // primary button / any touch
    const card = handle.closest(".folder-card, .deck-card");
    if (!card) return;
    e.preventDefault();
    const kind = card.classList.contains("folder-card") ? "folder" : "deck";
    const rect = card.getBoundingClientRect();
    const ghost = card.cloneNode(true);
    ghost.classList.add("deck-drag-ghost");
    ghost.classList.remove("drag-source");
    ghost.style.width = rect.width + "px";
    const indicator = document.createElement("div");
    indicator.className = "drop-indicator";
    deckDrag = {
      kind, id: card.dataset.id, card, ghost, indicator, pointerId: e.pointerId,
      offX: e.clientX - rect.left, offY: e.clientY - rect.top,
      startX: e.clientX, startY: e.clientY, lastX: e.clientX, lastY: e.clientY,
      moved: false, dropInto: null, raf: 0
    };
    document.body.appendChild(ghost);
    positionGhost(e.clientX, e.clientY);
    try { handle.setPointerCapture(e.pointerId); } catch (_){}
    window.addEventListener("pointermove", onDeckDragMove, { passive: false });
    window.addEventListener("pointerup", endDeckDrag);
    window.addEventListener("pointercancel", endDeckDrag);
    deckDrag.raf = requestAnimationFrame(deckDragScrollTick);
  }

  function onDeckDragMove(e){
    if (!deckDrag || e.pointerId !== deckDrag.pointerId) return;
    e.preventDefault();
    deckDrag.lastX = e.clientX; deckDrag.lastY = e.clientY;
    if (!deckDrag.moved &&
        Math.hypot(e.clientX - deckDrag.startX, e.clientY - deckDrag.startY) > 6){
      deckDrag.moved = true;                     // real drag, not a stray tap
      deckDrag.card.classList.add("drag-source");
    }
    if (deckDrag.moved){
      positionGhost(e.clientX, e.clientY);
      updateDrop(e.clientX, e.clientY);
    }
  }

  // Reorder the dragged item within its own kind/section, using the drop line's
  // position among the same-kind cards as the target index.
  function reorderFromIndicator(dd){
    const sel = dd.kind === "folder" ? ".folder-card" : ".deck-card";
    const seq = [...$("deck-list").children].filter(
      n => n === dd.indicator ||
           (n.matches && n.matches(sel) && !n.classList.contains("drag-source")));
    const newIndex = seq.indexOf(dd.indicator);
    if (newIndex < 0) return;
    if (dd.kind === "folder"){
      const from = state.folders.findIndex(f => f.id === dd.id);
      if (from < 0) return;
      const [m] = state.folders.splice(from, 1);
      state.folders.splice(Math.max(0, Math.min(state.folders.length, newIndex)), 0, m);
      saveState();
      return;
    }
    // Deck: reorder only within the current level's subsequence of state.decks,
    // leaving decks in other folders exactly where they sit.
    const belongs = currentFolderId ? (d) => d.folderId === currentFolderId : (d) => deckIsLoose(d);
    const positions = [];
    state.decks.forEach((d, i) => { if (belongs(d)) positions.push(i); });
    const subset = positions.map(i => state.decks[i]);
    const cur = subset.findIndex(d => d.id === dd.id);
    if (cur < 0) return;
    const [m] = subset.splice(cur, 1);
    subset.splice(Math.max(0, Math.min(subset.length, newIndex)), 0, m);
    positions.forEach((pos, k) => { state.decks[pos] = subset[k]; });
    saveState();
  }

  function endDeckDrag(e){
    if (!deckDrag || (e && e.pointerId !== deckDrag.pointerId)) return;
    window.removeEventListener("pointermove", onDeckDragMove, { passive: false });
    window.removeEventListener("pointerup", endDeckDrag);
    window.removeEventListener("pointercancel", endDeckDrag);
    const dd = deckDrag;
    deckDrag = null;
    if (dd.raf) cancelAnimationFrame(dd.raf);
    dd.ghost.remove();
    clearFolderHighlight();
    // Commit only on a real drop (pointerup after moving); cancel/no-move is a no-op.
    if (dd.moved && e && e.type === "pointerup"){
      if (dd.kind === "deck" && dd.dropInto){
        const deck = getDeck(dd.id);
        if (deck && dd.dropInto !== deck.folderId){
          deck.folderId = dd.dropInto; touch(deck); saveState();
          const f = getFolder(dd.dropInto);
          toast(f ? "Moved to " + f.name : "Moved");
        }
      } else if (dd.indicator.parentNode){
        reorderFromIndicator(dd);
      }
    }
    if (dd.indicator.parentNode) dd.indicator.remove();
    dd.card.classList.remove("drag-source");
    renderDecks();
  }

  // One delegated listener survives re-renders (the #deck-list node is reused).
  $("deck-list").addEventListener("pointerdown", startDeckDrag);

  // --- Card drag-and-drop reorder (inside a deck) -----------------------
  // Same shape as the deck DnD but for the card list — no folder-drop logic
  // since cards don't nest. Shares the .drag-handle / .deck-drag-ghost /
  // .drop-indicator / .drag-source CSS so it looks & feels identical.
  let cardDrag = null;

  function positionCardGhost(x, y){
    if (cardDrag) cardDrag.ghost.style.transform =
      `translate(${x - cardDrag.offX}px, ${y - cardDrag.offY}px)`;
  }

  function placeCardIndicator(y){
    const list = $("card-list");
    const items = [...list.querySelectorAll(".card-item:not(.drag-source)")];
    let ref = null;
    for (const c of items){
      const r = c.getBoundingClientRect();
      if (y < r.top + r.height / 2){ ref = c; break; }
    }
    if (ref) list.insertBefore(cardDrag.indicator, ref);
    else if (items.length) list.insertBefore(cardDrag.indicator, items[items.length - 1].nextSibling);
    else list.appendChild(cardDrag.indicator);
  }

  function cardDragScrollTick(){
    if (!cardDrag) return;
    if (cardDrag.moved){
      const y = cardDrag.lastY, margin = 70, step = 11;
      let d = 0;
      if (y < margin) d = -step;
      else if (y > window.innerHeight - margin) d = step;
      if (d){ window.scrollBy(0, d); placeCardIndicator(y); }
    }
    cardDrag.raf = requestAnimationFrame(cardDragScrollTick);
  }

  function startCardDrag(e){
    if (cardDrag) return;   // a drag is already in flight — ignore multi-touch/race pointerdowns
    const handle = e.target.closest(".drag-handle");
    if (!handle || (e.button && e.button > 0)) return;
    const item = handle.closest(".card-item");
    if (!item) return;
    e.preventDefault();
    const rect = item.getBoundingClientRect();
    const ghost = item.cloneNode(true);
    ghost.classList.add("deck-drag-ghost");
    ghost.classList.remove("drag-source");
    ghost.style.width = rect.width + "px";
    const indicator = document.createElement("div");
    indicator.className = "drop-indicator";
    cardDrag = {
      idx: parseInt(item.dataset.idx, 10), item, ghost, indicator, pointerId: e.pointerId,
      offX: e.clientX - rect.left, offY: e.clientY - rect.top,
      startX: e.clientX, startY: e.clientY, lastY: e.clientY,
      moved: false, raf: 0
    };
    document.body.appendChild(ghost);
    positionCardGhost(e.clientX, e.clientY);
    try { handle.setPointerCapture(e.pointerId); } catch (_){}
    window.addEventListener("pointermove", onCardDragMove, { passive: false });
    window.addEventListener("pointerup", endCardDrag);
    window.addEventListener("pointercancel", endCardDrag);
    cardDrag.raf = requestAnimationFrame(cardDragScrollTick);
  }

  function onCardDragMove(e){
    if (!cardDrag || e.pointerId !== cardDrag.pointerId) return;
    e.preventDefault();
    cardDrag.lastY = e.clientY;
    if (!cardDrag.moved &&
        Math.hypot(e.clientX - cardDrag.startX, e.clientY - cardDrag.startY) > 6){
      cardDrag.moved = true;
      cardDrag.item.classList.add("drag-source");
    }
    if (cardDrag.moved){
      positionCardGhost(e.clientX, e.clientY);
      placeCardIndicator(e.clientY);
    }
  }

  function endCardDrag(e){
    if (!cardDrag || (e && e.pointerId !== cardDrag.pointerId)) return;
    window.removeEventListener("pointermove", onCardDragMove, { passive: false });
    window.removeEventListener("pointerup", endCardDrag);
    window.removeEventListener("pointercancel", endCardDrag);
    const cd = cardDrag;
    cardDrag = null;
    if (cd.raf) cancelAnimationFrame(cd.raf);
    cd.ghost.remove();
    const commit = cd.moved && e && e.type === "pointerup" && cd.indicator.parentNode;
    let newIndex = -1;
    if (commit){
      const seq = [...$("card-list").children].filter(
        n => n === cd.indicator ||
             (n.classList && n.classList.contains("card-item") && !n.classList.contains("drag-source")));
      newIndex = seq.indexOf(cd.indicator);
    }
    if (cd.indicator.parentNode) cd.indicator.remove();
    cd.item.classList.remove("drag-source");
    if (commit && newIndex >= 0){
      const deck = getDeck(currentDeckId);
      if (deck && cd.idx >= 0 && cd.idx < deck.cards.length){
        const [m] = deck.cards.splice(cd.idx, 1);
        deck.cards.splice(Math.max(0, Math.min(deck.cards.length, newIndex)), 0, m);
        touch(deck); saveState();
      }
    }
    openDeckView();   // rerender the card list (reassigns data-idx)
  }

  $("card-list").addEventListener("pointerdown", startCardDrag);

  // --- Events: deck list view ---

  // --- Sync (encrypted GitHub Gist) ---
  const SYNC_KEY = "flashcards.sync.v1";
  function loadSync(){
    try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveSync(s){ localStorage.setItem(SYNC_KEY, JSON.stringify(s)); }

  function b64encode(bytes){
    let s = ""; for (let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function b64decode(str){
    const s = atob(str); const bytes = new Uint8Array(s.length);
    for (let i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(passphrase, salt){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  }

  async function encryptJSON(obj, passphrase){
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(passphrase, salt);
    const plaintext = new TextEncoder().encode(JSON.stringify(obj));
    const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
      { name: "AES-GCM", iv }, key, plaintext
    ));
    return {
      v: 1, alg: "AES-GCM/PBKDF2-SHA256-200k",
      salt: b64encode(salt), iv: b64encode(iv), data: b64encode(ciphertext)
    };
  }

  async function decryptJSON(envelope, passphrase){
    if (!envelope || envelope.v !== 1) throw new Error("Unknown format");
    const salt = b64decode(envelope.salt);
    const iv = b64decode(envelope.iv);
    const data = b64decode(envelope.data);
    const key = await deriveKey(passphrase, salt);
    const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
    return JSON.parse(new TextDecoder().decode(plaintext));
  }

  async function gistRequest(method, path, token, body){
    const res = await fetch("https://api.github.com" + path, {
      method,
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + token,
        "X-GitHub-Api-Version": "2022-11-28",
        ...(body ? {"Content-Type": "application/json"} : {})
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok){
      const text = await res.text();
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  const GIST_FILENAME = "flashcards.enc.json";

  // Download + decrypt the remote state. Returns the decrypted object, or
  // null if there's no gist / no data file yet. Throws on network/parse errors;
  // returns the sentinel "BAD_PASS" if the passphrase doesn't match.
  async function fetchRemoteState(cfg){
    if (!cfg.gistId) return null;
    const gist = await gistRequest("GET", `/gists/${cfg.gistId}`, cfg.token);
    const file = gist.files && gist.files[GIST_FILENAME];
    if (!file) return null;
    let content = file.content;
    if (file.truncated && file.raw_url){
      const r = await fetch(file.raw_url);
      content = await r.text();
    }
    const envelope = JSON.parse(content);
    try { return await decryptJSON(envelope, cfg.passphrase); }
    catch(e){ return "BAD_PASS"; }
  }

  // Guards against overlapping Push/Pull (e.g. double-taps) that could race or
  // create duplicate gists.
  let syncing = false;

  async function pushToGist(){
    if (syncing){ toast("Sync already running…"); return; }
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    syncing = true;
    try {
      // Safety net: never blindly overwrite the gist. Pull what's there, merge
      // it in, and warn if the remote had edits this device was about to clobber.
      if (cfg.gistId){
        toast("Checking remote…");
        let remote;
        try { remote = await fetchRemoteState(cfg); }
        catch(e){ remote = undefined; } // unreadable remote -> fall through and push
        if (remote === "BAD_PASS"){ toast("Wrong passphrase — push stopped"); return; }
        if (remote && Array.isArray(remote.decks)){
          migrateState(remote);
          const before = stateSignature(state);
          const mergedState = mergeStates(state, remote);
          if (stateSignature(mergedState) !== before){
            const ok = await confirm("The synced copy has changes this device doesn't have yet. Merge them in, then push? Nothing will be lost.");
            if (!ok){ toast("Push cancelled"); return; }
            state.folders = mergedState.folders;
            state.folderTomb = mergedState.folderTomb;
            state.decks = mergedState.decks;
            state.deckTomb = mergedState.deckTomb;
            saveState();
            renderDecks();
          }
        }
      }
      toast("Encrypting…");
      const envelope = await encryptJSON(state, cfg.passphrase);
      const content = JSON.stringify(envelope, null, 2);
      toast("Uploading…");
      let gist;
      if (cfg.gistId){
        gist = await gistRequest("PATCH", `/gists/${cfg.gistId}`, cfg.token, {
          files: { [GIST_FILENAME]: { content } }
        });
      } else {
        gist = await gistRequest("POST", `/gists`, cfg.token, {
          description: "flashcards (encrypted)",
          public: false,
          files: { [GIST_FILENAME]: { content } }
        });
        cfg.gistId = gist.id;
        saveSync(cfg);
      }
      toast("Pushed ✓");
    } catch(e){
      toast("Push failed: " + e.message.slice(0,60));
    } finally {
      syncing = false;
    }
  }

  async function pullFromGist(){
    if (syncing){ toast("Sync already running…"); return; }
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    if (!cfg.gistId){ toast("No gist yet — push first"); return; }
    syncing = true;
    try {
      toast("Downloading…");
      const gist = await gistRequest("GET", `/gists/${cfg.gistId}`, cfg.token);
      const file = gist.files && gist.files[GIST_FILENAME];
      if (!file){ toast("Gist missing data file"); return; }
      let content = file.content;
      if (file.truncated && file.raw_url){
        const r = await fetch(file.raw_url);
        content = await r.text();
      }
      const envelope = JSON.parse(content);
      toast("Decrypting…");
      let remote;
      try { remote = await decryptJSON(envelope, cfg.passphrase); }
      catch(e){ toast("Wrong passphrase"); return; }
      if (!remote || !Array.isArray(remote.decks)){ toast("Bad remote data"); return; }
      migrateState(remote);
      const mergedState = mergeStates(state, remote);
      state.folders = mergedState.folders;
      state.folderTomb = mergedState.folderTomb;
      state.decks = mergedState.decks;
      state.deckTomb = mergedState.deckTomb;
      saveState();
      renderDecks();
      if (currentDeckId && getDeck(currentDeckId)) openDeckView();
      toast(`Pulled ✓ (${remote.decks.length} remote)`);
    } catch(e){
      toast("Pull failed: " + e.message.slice(0,60));
    } finally {
      syncing = false;
    }
  }

  function applyTheme(id){
    const t = THEMES[id];
    if (!t) return false;
    for (const [k, v] of Object.entries(t.vars)){
      document.documentElement.style.setProperty(k, v);
    }
    localStorage.setItem(THEME_KEY, id);
    // Cache the resolved colors so the inline <head> script can paint them
    // before the body renders next launch (avoids a flash of the default theme).
    try { localStorage.setItem("flashcards.themeVars.v1", JSON.stringify(t.vars)); } catch(e){}
    return true;
  }

  function currentThemeId(){
    return localStorage.getItem(THEME_KEY) || "flower";
  }

  async function openThemesMenu(){
    const current = currentThemeId();
    const rows = Object.entries(THEMES).map(([id, t]) =>
      `<button class="theme-row${id === current ? " theme-current" : ""}" data-theme-id="${esc(id)}">${esc(t.name)}${id === current ? "  ✓" : ""}</button>`
    ).join("");
    const body = `
      <div style="display:flex;flex-direction:column;gap:8px;">${rows}</div>
      <div style="color:var(--surface-fg);font-size:12px;margin-top:14px;line-height:1.4;opacity:0.85;">More themes coming soon. Your current theme is saved on this device.</div>
    `;
    const p = openModal({title:"Themes", body, okText:"Close", cancelText:"", showCancel:false});
    setTimeout(() => {
      document.querySelectorAll("[data-theme-id]").forEach(b => {
        b.onclick = () => {
          const id = b.dataset.themeId;
          applyTheme(id);
          closeModal({ok:true});
          toast("Applied " + THEMES[id].name);
        };
      });
    }, 60);
    await p;
  }

  $("btn-themes").addEventListener("click", openThemesMenu);

  // Apply saved theme on load (falls back to flower)
  applyTheme(currentThemeId());

  // --- Initial render ---
  renderDecks();
  show("view-decks");

  // Best-effort: ask the browser not to evict our cards. iOS may ignore this,
  // but on desktop/Android it meaningfully reduces the chance localStorage is
  // cleared after periods of disuse. Sync is still the real backup.
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persisted().then(already => {
      if (!already) navigator.storage.persist().catch(() => {});
    }).catch(() => {});
  }

  // Prevent iOS pinch-zoom interfering
  document.addEventListener("gesturestart", e => e.preventDefault());

  // Register service worker for offline use (only when served over http/https)
  if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
