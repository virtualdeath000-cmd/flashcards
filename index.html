<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flashcards</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #0e0e12; color: #f2f2f5;
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
    -webkit-overflow-scrolling: touch;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
  h1 { font-size: 22px; margin: 8px 0 16px; font-weight: 600; letter-spacing: -0.3px; }
  h2 { font-size: 18px; margin: 0; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .grow { flex: 1; }
  button, .btn {
    background: #2a2a32; color: #f2f2f5;
    border: none; border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px; font-weight: 500;
    cursor: pointer; touch-action: manipulation;
    font-family: inherit;
  }
  button:active { background: #3a3a44; }
  .btn-primary { background: #FC1212; }
  .btn-primary:active { background: #c20e0e; }
  .btn-danger { background: #FF5500; }
  .btn-danger:active { background: #cc4400; }
  .btn-ghost { background: transparent; padding: 8px 10px; }
  .btn-ghost:active { background: #1f1f26; }
  .btn-small { padding: 8px 12px; font-size: 14px; }
  .icon-btn {
    width: 40px; height: 40px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  input, textarea {
    width: 100%;
    background: #1c1c22; color: #f2f2f5;
    border: 1px solid #2a2a32;
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  textarea { resize: none; min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: #FC1212; }
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .deck-card {
    background: #1c1c22;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .deck-card .meta { font-size: 13px; color: #8a8a95; margin-top: 2px; }
  .deck-card .info { flex: 1; min-width: 0; }
  .deck-card .info > div:first-child {
    font-weight: 600; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-item {
    background: #1c1c22;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .card-item .sides { flex: 1; min-width: 0; font-size: 14px; }
  .card-item .side-label { color: #8a8a95; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-item .side-text { margin: 2px 0 8px; word-wrap: break-word; }
  .card-item .side-text:last-child { margin-bottom: 0; }
  .empty {
    text-align: center; padding: 40px 20px;
    color: #6a6a75;
  }
  .fab-row {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .fab-row button { flex: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1c1c22;
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 560px;
  }
  .modal h3 { margin: 0 0 14px; font-size: 20px; }
  .modal .actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal .actions button { flex: 1; }
  .modal textarea { min-height: 120px; font-size: 17px; }
  .add-another {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 22px;
    font-weight: 600;
    background: #0C00ED;
  }
  .add-another:active { background: #0900b8; }
  .top-corner-actions {
    display: flex; gap: 8px;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .top-corner-actions button {
    padding: 8px 14px;
    font-size: 14px;
    background: #1c1c22;
  }

  /* Play view */
  .play-card {
    background: #1c1c22;
    border-radius: 18px;
    min-height: 60vh;
    padding: 24px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-size: 22px; line-height: 1.4;
    white-space: pre-wrap; word-wrap: break-word;
    -webkit-user-select: text; user-select: text;
  }
  .play-card.back { background: #232330; }
  .progress {
    text-align: center; color: #8a8a95; font-size: 14px; margin: 12px 0;
  }
  .play-controls { display: flex; gap: 10px; margin-top: 16px; }
  .play-controls button { flex: 1; padding: 16px; font-size: 17px; }

  .hidden { display: none !important; }
  .menu {
    display: flex; gap: 6px;
  }
  .file-input { display: none; }
  .pill {
    font-size: 12px; padding: 3px 8px; border-radius: 8px;
    background: #2a2a32; color: #b8b8c0;
  }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #2a2a32; color: #f2f2f5;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- Deck list view -->
  <div id="view-decks">
    <div class="top-corner-actions" id="top-actions">
      <button id="btn-sync">Sync</button>
      <button id="btn-import">Import</button>
      <button id="btn-export">Export</button>
    </div>
    <h1>Flashcards</h1>
    <div id="deck-list" class="list"></div>
    <div class="fab-row">
      <button class="btn-primary" id="btn-new-deck">+ New Deck</button>
    </div>
  </div>

  <!-- Deck detail / edit view -->
  <div id="view-deck" class="hidden">
    <div class="row between">
      <button class="btn-ghost" id="btn-back-to-decks">‹ Decks</button>
      <div class="menu">
        <button class="btn-ghost btn-small" id="btn-rename-deck">Rename</button>
        <button class="btn-ghost btn-small" id="btn-delete-deck" style="color:#FF5500;">Delete</button>
      </div>
    </div>
    <h1 id="deck-title" style="margin-top:8px;"></h1>
    <button class="btn-primary" id="btn-play" style="width:100%;">▶ Play Deck</button>
    <button id="btn-add-card" style="width:100%; margin-top:8px;">+ Card</button>
    <div id="card-list" class="list"></div>
  </div>

  <!-- Play view -->
  <div id="view-play" class="hidden">
    <div class="row between">
      <button class="btn-ghost" id="btn-exit-play">‹ Exit</button>
      <button class="btn-ghost btn-small" id="btn-shuffle">Shuffle</button>
    </div>
    <div class="progress" id="play-progress"></div>
    <div class="play-card" id="play-card-display"></div>
    <div class="play-controls">
      <button id="btn-flip">Flip</button>
      <button class="btn-primary" id="btn-next">Next ›</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Title</h3>
    <div id="modal-body"></div>
    <div class="actions">
      <button id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<input type="file" id="import-file" class="file-input" accept=".json,application/json">
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "flashcards.v1";

  // --- State ---
  let state = loadState();
  let currentDeckId = null;
  let play = null; // {order:[idx], pos:0, side:'front'}

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { decks: [] };
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.decks)) return { decks: [] };
      return parsed;
    } catch(e){ return { decks: [] }; }
  }
  function saveState(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ toast("Couldn't save — storage full?"); }
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function getDeck(id){ return state.decks.find(d => d.id === id); }
  function touch(deck){ if (deck) deck.updated = Date.now(); }

  // --- DOM helpers ---
  const $ = (id) => document.getElementById(id);
  function show(viewId){
    ["view-decks","view-deck","view-play"].forEach(v => $(v).classList.toggle("hidden", v !== viewId));
    window.scrollTo(0,0);
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // --- Toast ---
  let toastTimer;
  function toast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // --- Modal ---
  let modalResolve = null;
  function openModal({title, body, okText="OK", cancelText="Cancel", showCancel=true}){
    return new Promise(resolve => {
      $("modal-title").textContent = title;
      $("modal-body").innerHTML = body;
      $("modal-ok").textContent = okText;
      $("modal-cancel").textContent = cancelText;
      $("modal-cancel").style.display = showCancel ? "" : "none";
      $("modal").classList.add("show");
      modalResolve = resolve;
      // Autofocus first input
      setTimeout(() => {
        const first = $("modal-body").querySelector("input,textarea");
        if (first) first.focus();
      }, 50);
    });
  }
  function closeModal(result){
    $("modal").classList.remove("show");
    if (modalResolve){ const r = modalResolve; modalResolve = null; r(result); }
  }
  function collectAndClose(extra){
    const inputs = {};
    $("modal-body").querySelectorAll("[data-field]").forEach(el => {
      inputs[el.dataset.field] = el.value;
    });
    closeModal(Object.assign({ ok: true, values: inputs }, extra || {}));
  }
  $("modal-ok").addEventListener("click", () => collectAndClose());
  $("modal-cancel").addEventListener("click", () => closeModal({ ok: false }));
  $("modal").addEventListener("click", (e) => {
    if (e.target.id === "modal") closeModal({ ok: false });
  });
  $("modal-body").addEventListener("click", (e) => {
    const btn = e.target.closest('[data-action="add-another"]');
    if (btn) collectAndClose({ addAnother: true });
  });

  async function promptText({title, label, value="", placeholder="", multiline=false}){
    const id = "f_" + Math.random().toString(36).slice(2);
    const body = `
      <label style="font-size:13px;color:#8a8a95;display:block;margin-bottom:6px;">${esc(label)}</label>
      ${multiline
        ? `<textarea data-field="${id}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
        : `<input data-field="${id}" type="text" placeholder="${esc(placeholder)}" value="${esc(value)}">`}
    `;
    const result = await openModal({title, body});
    if (!result.ok) return null;
    return result.values[id];
  }

  async function promptCard({title, front="", back="", allowAddAnother=false}){
    const idF = "front_" + Math.random().toString(36).slice(2);
    const idB = "back_" + Math.random().toString(36).slice(2);
    const extra = allowAddAnother
      ? `<button class="add-another" data-action="add-another" type="button">+</button>`
      : "";
    const body = `
      <label style="font-size:13px;color:#8a8a95;display:block;margin-bottom:6px;">Front</label>
      <textarea data-field="${idF}" placeholder="Question / prompt">${esc(front)}</textarea>
      <label style="font-size:13px;color:#8a8a95;display:block;margin:12px 0 6px;">Back</label>
      <textarea data-field="${idB}" placeholder="Answer">${esc(back)}</textarea>
      ${extra}
    `;
    const result = await openModal({title, body, okText:"Save & Close"});
    if (!result.ok) return null;
    return {
      front: result.values[idF].trim(),
      back: result.values[idB].trim(),
      addAnother: !!result.addAnother
    };
  }

  async function confirm(message){
    const body = `<div style="font-size:15px;color:#d8d8df;">${esc(message)}</div>`;
    const result = await openModal({title:"Confirm", body, okText:"Yes", cancelText:"Cancel"});
    return result.ok;
  }

  // --- Render: decks ---
  function renderDecks(){
    const list = $("deck-list");
    if (state.decks.length === 0){
      list.innerHTML = "";
      return;
    }
    list.innerHTML = state.decks.map(d => `
      <div class="deck-card" data-id="${d.id}">
        <div class="info" data-action="open">
          <div>${esc(d.name)}</div>
          <div class="meta">${d.cards.length} card${d.cards.length===1?"":"s"}</div>
        </div>
        <span class="pill" data-action="open">${d.cards.length}</span>
      </div>
    `).join("");
    list.querySelectorAll(".deck-card").forEach(el => {
      el.addEventListener("click", () => {
        currentDeckId = el.dataset.id;
        openDeckView();
      });
    });
  }

  // --- Render: deck detail ---
  function openDeckView(){
    const deck = getDeck(currentDeckId);
    if (!deck) return show("view-decks");
    $("deck-title").textContent = deck.name;
    const list = $("card-list");
    if (deck.cards.length === 0){
      list.innerHTML = `<div class="empty">No cards yet.<br>Tap "+ Card" to add one.</div>`;
    } else {
      list.innerHTML = deck.cards.map((c, i) => `
        <div class="card-item" data-idx="${i}">
          <div class="sides">
            <div class="side-label">Front</div>
            <div class="side-text">${esc(c.front) || '<i style="color:#6a6a75">empty</i>'}</div>
            <div class="side-label">Back</div>
            <div class="side-text">${esc(c.back) || '<i style="color:#6a6a75">empty</i>'}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <button class="btn-small" data-action="edit">Edit</button>
            <button class="btn-small btn-danger" data-action="del">Del</button>
          </div>
        </div>
      `).join("");
      list.querySelectorAll(".card-item").forEach(el => {
        const idx = parseInt(el.dataset.idx, 10);
        el.querySelector('[data-action="edit"]').addEventListener("click", () => editCard(idx));
        el.querySelector('[data-action="del"]').addEventListener("click", () => deleteCard(idx));
      });
    }
    show("view-deck");
  }

  async function editCard(idx){
    const deck = getDeck(currentDeckId);
    const card = deck.cards[idx];
    const result = await promptCard({title:"Edit Card", front:card.front, back:card.back});
    if (!result) return;
    if (!result.front && !result.back){ toast("Card empty — not saved"); return; }
    deck.cards[idx] = { front: result.front, back: result.back };
    touch(deck);
    saveState();
    openDeckView();
  }
  async function deleteCard(idx){
    const ok = await confirm("Delete this card?");
    if (!ok) return;
    const deck = getDeck(currentDeckId);
    deck.cards.splice(idx,1);
    touch(deck);
    saveState();
    openDeckView();
  }

  // --- Events: deck list view ---
  $("btn-new-deck").addEventListener("click", async () => {
    const name = await promptText({title:"New Deck", label:"Deck name", placeholder:"e.g. Spanish Verbs"});
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed){ toast("Name can't be empty"); return; }
    const deck = { id: uid(), name: trimmed, cards: [], created: Date.now(), updated: Date.now() };
    state.decks.unshift(deck);
    saveState();
    currentDeckId = deck.id;
    renderDecks();
    openDeckView();
  });

  $("btn-back-to-decks").addEventListener("click", () => {
    renderDecks();
    show("view-decks");
  });

  $("btn-rename-deck").addEventListener("click", async () => {
    const deck = getDeck(currentDeckId);
    const name = await promptText({title:"Rename Deck", label:"Deck name", value:deck.name});
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed){ toast("Name can't be empty"); return; }
    deck.name = trimmed;
    touch(deck);
    saveState();
    $("deck-title").textContent = trimmed;
  });

  $("btn-delete-deck").addEventListener("click", async () => {
    const deck = getDeck(currentDeckId);
    const ok = await confirm(`Delete deck "${deck.name}" and all its cards?`);
    if (!ok) return;
    state.decks = state.decks.filter(d => d.id !== currentDeckId);
    saveState();
    currentDeckId = null;
    renderDecks();
    show("view-decks");
  });

  $("btn-add-card").addEventListener("click", async () => {
    const deck = getDeck(currentDeckId);
    let added = 0;
    while (true){
      const result = await promptCard({title: added === 0 ? "New Card" : `New Card (${added} added)`, allowAddAnother: true});
      if (!result) break;
      if (!result.front && !result.back){
        toast("Card empty — skipped");
        if (!result.addAnother) break;
        continue;
      }
      deck.cards.push({ front: result.front, back: result.back });
      touch(deck);
      saveState();
      added++;
      if (!result.addAnother) break;
    }
    if (added > 0) toast(`Added ${added} card${added===1?"":"s"}`);
    openDeckView();
  });

  // --- Play ---
  $("btn-play").addEventListener("click", () => {
    const deck = getDeck(currentDeckId);
    if (deck.cards.length === 0){ toast("Add some cards first"); return; }
    play = { order: deck.cards.map((_,i) => i), pos: 0, side: "front" };
    renderPlay();
    show("view-play");
  });
  $("btn-exit-play").addEventListener("click", () => {
    play = null;
    openDeckView();
  });
  $("btn-flip").addEventListener("click", () => {
    if (!play) return;
    play.side = play.side === "front" ? "back" : "front";
    renderPlay();
  });
  $("btn-next").addEventListener("click", () => {
    if (!play) return;
    if (play.pos >= play.order.length - 1){
      toast("Deck complete!");
      play = null;
      openDeckView();
      return;
    }
    play.pos++;
    play.side = "front";
    renderPlay();
  });
  $("btn-shuffle").addEventListener("click", () => {
    if (!play) return;
    for (let i = play.order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [play.order[i], play.order[j]] = [play.order[j], play.order[i]];
    }
    play.pos = 0; play.side = "front";
    renderPlay();
    toast("Shuffled");
  });

  function renderPlay(){
    const deck = getDeck(currentDeckId);
    if (!deck || !play) return;
    const card = deck.cards[play.order[play.pos]];
    $("play-progress").textContent = `${play.pos+1} / ${play.order.length}  •  ${play.side === "front" ? "Front" : "Back"}`;
    const disp = $("play-card-display");
    disp.textContent = (play.side === "front" ? card.front : card.back) || "(empty)";
    disp.classList.toggle("back", play.side === "back");
    $("btn-next").textContent = (play.pos >= play.order.length - 1) ? "Finish" : "Next ›";
  }

  // Tap the card to flip
  $("play-card-display").addEventListener("click", () => $("btn-flip").click());

  // --- Export / Import ---
  $("btn-export").addEventListener("click", () => {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const stamp = new Date().toISOString().slice(0,10);
    const a = document.createElement("a");
    a.href = url;
    a.download = `flashcards-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast("Exported");
  });

  $("btn-import").addEventListener("click", () => $("import-file").click());
  $("import-file").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || !Array.isArray(parsed.decks)) throw new Error("Invalid file");
      const ok = await confirm(`Import ${parsed.decks.length} deck(s)? "Yes" merges with your current decks. "Cancel" aborts.`);
      if (!ok){ e.target.value = ""; return; }
      // Merge — new IDs to avoid collisions
      parsed.decks.forEach(d => {
        if (!d || !Array.isArray(d.cards)) return;
        state.decks.push({
          id: uid(),
          name: String(d.name || "Imported deck"),
          cards: d.cards.filter(c => c && typeof c === "object").map(c => ({
            front: String(c.front || ""),
            back: String(c.back || "")
          })),
          created: Date.now()
        });
      });
      saveState();
      renderDecks();
      toast(`Imported ${parsed.decks.length} deck(s)`);
    } catch(err){
      toast("Import failed — bad file");
    }
    e.target.value = "";
  });

  // --- Sync (encrypted GitHub Gist) ---
  const SYNC_KEY = "flashcards.sync.v1";
  function loadSync(){
    try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveSync(s){ localStorage.setItem(SYNC_KEY, JSON.stringify(s)); }

  function b64encode(bytes){
    let s = ""; for (let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function b64decode(str){
    const s = atob(str); const bytes = new Uint8Array(s.length);
    for (let i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(passphrase, salt){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  }

  async function encryptJSON(obj, passphrase){
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(passphrase, salt);
    const plaintext = new TextEncoder().encode(JSON.stringify(obj));
    const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
      { name: "AES-GCM", iv }, key, plaintext
    ));
    return {
      v: 1, alg: "AES-GCM/PBKDF2-SHA256-200k",
      salt: b64encode(salt), iv: b64encode(iv), data: b64encode(ciphertext)
    };
  }

  async function decryptJSON(envelope, passphrase){
    if (!envelope || envelope.v !== 1) throw new Error("Unknown format");
    const salt = b64decode(envelope.salt);
    const iv = b64decode(envelope.iv);
    const data = b64decode(envelope.data);
    const key = await deriveKey(passphrase, salt);
    const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
    return JSON.parse(new TextDecoder().decode(plaintext));
  }

  async function gistRequest(method, path, token, body){
    const res = await fetch("https://api.github.com" + path, {
      method,
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + token,
        "X-GitHub-Api-Version": "2022-11-28",
        ...(body ? {"Content-Type": "application/json"} : {})
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok){
      const text = await res.text();
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  const GIST_FILENAME = "flashcards.enc.json";

  async function pushToGist(){
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    try {
      toast("Encrypting…");
      const envelope = await encryptJSON(state, cfg.passphrase);
      const content = JSON.stringify(envelope, null, 2);
      toast("Uploading…");
      let gist;
      if (cfg.gistId){
        gist = await gistRequest("PATCH", `/gists/${cfg.gistId}`, cfg.token, {
          files: { [GIST_FILENAME]: { content } }
        });
      } else {
        gist = await gistRequest("POST", `/gists`, cfg.token, {
          description: "flashcards (encrypted)",
          public: false,
          files: { [GIST_FILENAME]: { content } }
        });
        cfg.gistId = gist.id;
        saveSync(cfg);
      }
      toast("Pushed ✓");
    } catch(e){
      toast("Push failed: " + e.message.slice(0,60));
    }
  }

  async function pullFromGist(){
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    if (!cfg.gistId){ toast("No gist yet — push first"); return; }
    try {
      toast("Downloading…");
      const gist = await gistRequest("GET", `/gists/${cfg.gistId}`, cfg.token);
      const file = gist.files && gist.files[GIST_FILENAME];
      if (!file){ toast("Gist missing data file"); return; }
      let content = file.content;
      if (file.truncated && file.raw_url){
        const r = await fetch(file.raw_url);
        content = await r.text();
      }
      const envelope = JSON.parse(content);
      toast("Decrypting…");
      let remote;
      try { remote = await decryptJSON(envelope, cfg.passphrase); }
      catch(e){ toast("Wrong passphrase"); return; }
      if (!remote || !Array.isArray(remote.decks)){ toast("Bad remote data"); return; }
      // Merge: by deck id, take newer 'updated'. New ids from either side kept.
      const localById = new Map(state.decks.map(d => [d.id, d]));
      const merged = [];
      const seen = new Set();
      remote.decks.forEach(rd => {
        if (!rd || !rd.id) return;
        const ld = localById.get(rd.id);
        if (!ld) merged.push(rd);
        else merged.push(((rd.updated||0) >= (ld.updated||0)) ? rd : ld);
        seen.add(rd.id);
      });
      state.decks.forEach(ld => { if (!seen.has(ld.id)) merged.push(ld); });
      state.decks = merged;
      saveState();
      renderDecks();
      toast(`Pulled ✓ (${remote.decks.length} remote)`);
    } catch(e){
      toast("Pull failed: " + e.message.slice(0,60));
    }
  }

  async function openSyncMenu(){
    const cfg = loadSync();
    const configured = !!(cfg.token && cfg.passphrase);
    const status = configured
      ? `Configured.${cfg.gistId ? " Gist: " + cfg.gistId.slice(0,8) + "…" : " No gist yet."}`
      : "Not set up.";
    const body = `
      <div style="color:#b8b8c0; font-size:14px; margin-bottom:14px;">${esc(status)}</div>
      <button id="sync-push" class="btn-primary" style="width:100%; margin-bottom:8px; padding:14px;">↑ Push (upload to gist)</button>
      <button id="sync-pull" class="btn-primary" style="width:100%; margin-bottom:8px; padding:14px;">↓ Pull (download &amp; merge)</button>
      <button id="sync-setup" style="width:100%; margin-bottom:8px;">${configured ? "Change setup" : "Set up sync…"}</button>
      ${configured ? `<button id="sync-forget" class="btn-danger" style="width:100%;">Forget sync settings on this device</button>` : ""}
    `;
    const p = openModal({title:"Sync", body, okText:"Close", cancelText:"", showCancel:false});
    // Wire up buttons inside the modal
    setTimeout(() => {
      const push = document.getElementById("sync-push");
      const pull = document.getElementById("sync-pull");
      const setup = document.getElementById("sync-setup");
      const forget = document.getElementById("sync-forget");
      if (push) push.onclick = () => { closeModal({ok:true}); pushToGist(); };
      if (pull) pull.onclick = () => { closeModal({ok:true}); pullFromGist(); };
      if (setup) setup.onclick = () => { closeModal({ok:true}); openSyncSetup(); };
      if (forget) forget.onclick = async () => {
        const ok = await confirm("Forget token, passphrase, and gist ID on this device? Your gist on GitHub stays — you can reconnect later.");
        if (!ok) return;
        localStorage.removeItem(SYNC_KEY);
        toast("Sync settings cleared");
      };
    }, 60);
    await p;
  }

  async function openSyncSetup(){
    const cfg = loadSync();
    const body = `
      <label style="font-size:13px;color:#8a8a95;display:block;margin-bottom:6px;">GitHub token (starts with github_pat_…)</label>
      <input data-field="token" type="text" placeholder="github_pat_..." value="${esc(cfg.token||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <label style="font-size:13px;color:#8a8a95;display:block;margin:12px 0 6px;">Passphrase (must match on every device)</label>
      <input data-field="pass" type="text" placeholder="passphrase you'll remember" value="${esc(cfg.passphrase||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <label style="font-size:13px;color:#8a8a95;display:block;margin:12px 0 6px;">Existing gist ID (optional — leave blank to create new on first push)</label>
      <input data-field="gistId" type="text" placeholder="leave blank for new" value="${esc(cfg.gistId||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div style="color:#8a8a95;font-size:12px;margin-top:10px;line-height:1.4;">Token is stored only in this browser. Your passphrase encrypts data before upload — GitHub never sees it.</div>
    `;
    const result = await openModal({title:"Sync setup", body, okText:"Save"});
    if (!result.ok) return;
    const next = {
      token: result.values.token.trim(),
      passphrase: result.values.pass,
      gistId: result.values.gistId.trim() || undefined
    };
    if (!next.token || !next.passphrase){ toast("Token and passphrase required"); return; }
    saveSync(next);
    toast("Saved. Tap Sync → Push to upload, or Pull to download.");
  }

  $("btn-sync").addEventListener("click", openSyncMenu);

  // --- Initial render ---
  renderDecks();
  show("view-decks");

  // Prevent iOS pinch-zoom interfering
  document.addEventListener("gesturestart", e => e.preventDefault());

  // Register service worker for offline use (only when served over http/https)
  if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
