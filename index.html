<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hive_cards</title>
<meta name="apple-mobile-web-app-title" content="Hive_cards">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0F0000">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<style>
  :root {
    --bg: #0F0000;
    --fg: #FFFFFF;
    --surface: #B87FB2;
    --surface-fg: #FFFFFF;
    --primary: #FFB5FA;
    --primary-fg: #4a1a45;
    --primary-active: #ec9ce6;
    --danger: #FF5500;
    --danger-fg: #FFFFFF;
    --danger-active: #cc4400;
    --input-bg: #0D0D0D;
    --input-fg: #FFFFFF;
    --input-border: #1f1f1f;
    --btn: #2a2a32;
    --btn-fg: #FFFFFF;
    --btn-active: #3a3a44;
    --ghost-active: #1f1f26;
    --play-card: #1c1c22;
    --play-card-back: #232330;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--fg);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
    -webkit-overflow-scrolling: touch;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
  h1 { font-size: 22px; margin: 8px 0 16px; font-weight: 600; letter-spacing: -0.3px; }
  h2 { font-size: 18px; margin: 0; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .grow { flex: 1; }
  button, .btn {
    background: var(--btn); color: var(--btn-fg);
    border: none; border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px; font-weight: 500;
    cursor: pointer; touch-action: manipulation;
    font-family: inherit;
  }
  button:active { background: var(--btn-active); }
  .btn-primary { background: var(--primary); color: var(--primary-fg); }
  .btn-primary:active { background: var(--primary-active); }
  .btn-danger { background: var(--danger); color: var(--danger-fg); }
  .btn-danger:active { background: var(--danger-active); }
  .btn-ghost { background: transparent; padding: 8px 10px; }
  .btn-ghost:active { background: var(--ghost-active); }
  .btn-small { padding: 8px 12px; font-size: 14px; }
  button:disabled { opacity: 0.3; }
  .reorder { display: flex; flex-direction: column; gap: 6px; }
  .reorder-btn { padding: 6px 10px; font-size: 13px; line-height: 1; }
  .icon-btn {
    width: 40px; height: 40px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  input, textarea {
    width: 100%;
    background: var(--input-bg); color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  textarea { resize: none; min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .deck-card {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .deck-card .meta { font-size: 13px; color: var(--surface-fg); margin-top: 2px; }
  .deck-card .info { flex: 1; min-width: 0; }
  .deck-card .info > div:first-child {
    font-weight: 600; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-item {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .card-item .sides { flex: 1; min-width: 0; font-size: 14px; }
  .card-item .side-label { color: var(--surface-fg); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-item .side-text { margin: 2px 0 8px; word-wrap: break-word; }
  .card-item .side-text:last-child { margin-bottom: 0; }
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--fg);
  }
  .fab-row {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .fab-row button { flex: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    color: var(--surface-fg);
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 560px;
  }
  .modal h3 { margin: 0 0 14px; font-size: 20px; color: var(--surface-fg); }
  .modal .actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal .actions button { flex: 1; }
  .modal textarea { min-height: 120px; font-size: 17px; }
  .add-another {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 22px;
    font-weight: 600;
    background: var(--primary);
    color: var(--primary-fg);
  }
  .add-another:active { background: var(--primary-active); }
  #modal-ok, #modal-cancel { background: var(--primary); color: var(--primary-fg); }
  #modal-ok:active, #modal-cancel:active { background: var(--primary-active); }
  .top-corner-actions {
    display: flex; gap: 8px;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .top-corner-actions button {
    padding: 8px 14px;
    font-size: 14px;
    background: var(--play-card);
  }

  /* Play view */
  .play-card {
    background: var(--play-card);
    border-radius: 18px;
    min-height: 60vh;
    padding: 24px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    cursor: pointer; touch-action: manipulation;
  }
  .play-card.back { background: var(--play-card-back); }
  .play-card-text {
    width: 100%; max-width: 100%;
    text-align: center;
    font-size: 22px; line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    -webkit-user-select: none; user-select: none;
  }
  .progress {
    text-align: center; color: var(--fg); font-size: 14px; margin: 12px 0;
  }
  .play-controls { display: flex; gap: 10px; margin-top: 16px; }
  .play-controls button { flex: 1; padding: 16px; font-size: 17px; }
  .practice-box {
    margin-top: 12px;
    min-height: 90px;
  }
  .toggle-on { background: var(--primary) !important; color: var(--primary-fg); }

  .hidden { display: none !important; }
  .menu {
    display: flex; gap: 6px;
  }
  .file-input { display: none; }
  .pill {
    font-size: 12px; padding: 3px 8px; border-radius: 8px;
    background: var(--btn); color: var(--btn-fg);
  }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--btn); color: var(--btn-fg);
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 200;
  }
  .toast.show { opacity: 1; }
  .theme-row {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: var(--primary-fg);
    text-align: left;
    font-size: 15px;
    font-weight: 500;
  }
  .theme-row:active { background: var(--primary-active); }
  .theme-row.theme-current { background: var(--primary-active); }
</style>
<script>
  // Apply the saved theme's colors before first paint to avoid a flash of the
  // default (Flower) palette. Uses the vars cached by applyTheme on the last visit.
  (function(){
    try {
      var v = JSON.parse(localStorage.getItem("flashcards.themeVars.v1"));
      if (v) for (var k in v) document.documentElement.style.setProperty(k, v[k]);
    } catch(e){}
  })();
</script>

<body>
<div class="app">

  <!-- Deck list view -->
  <div id="view-decks">
    <div class="top-corner-actions" id="top-actions">
      <button id="btn-themes">Themes</button>
      <button id="btn-sync">Sync</button>
      <button id="btn-import">Import</button>
      <button id="btn-export">Export</button>
    </div>
    <h1>Hive_cards</h1>
    <div id="deck-list" class="list"></div>

      <button class="btn-primary" id="btn-new-deck">+ New Deck</button>
    </div>
  </div>

  <!-- Deck detail / edit view -->
  <div id="view-deck" class="hidden">
    <div class="row between">
      <button class="btn-ghost" id="btn-back-to-decks">‹ Decks</button>
      <div class="menu">
        <button class="btn-ghost btn-small" id="btn-rename-deck">Rename</button>
        <button class="btn-ghost btn-small" id="btn-delete-deck" style="color:var(--danger);">Delete</button>
      </div>
    </div>
    <h1 id="deck-title" style="margin-top:8px;"></h1>
    <button class="btn-primary" id="btn-play" style="width:100%;">▶ Play Deck</button>

  <div id="view-play" class="hidden">

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Title</h3>
    <div id="modal-body"></div>
    <div class="actions">
      <button id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<input type="file" id="import-file" class="file-input" accept=".json,application/json">
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "flashcards.v1";

  // --- State ---
  let state = loadState();
  let currentDeckId = null;
  let play = null; // {order:[idx], pos:0, side:'front'}

  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { decks: [], deckTomb: {} };
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.decks)) return { decks: [], deckTomb: {} };
      return migrateState(parsed);
    } catch(e){ return { decks: [], deckTomb: {} }; }
  }
  function saveState(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ toast("Couldn't save — storage full?"); }
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function getDeck(id){ return state.decks.find(d => d.id === id); }
  function touch(deck){ if (deck) deck.updated = Date.now(); }

  // --- Schema migration + card-level merge -------------------------------
  // Older data stored cards as bare {front, back}. For reliable cross-device
  // sync each card needs a stable id and an 'updated' time, and each deck a
  // tombstone map of deleted card ids -> when. migrateState backfills all of
  // this in place. Legacy cards get a content-derived id so two devices that
  // were already in sync produce the SAME id (avoids duplicates on first merge).
  function hashStr(s){
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = (((h << 5) + h) + s.charCodeAt(i)) | 0;
    return (h >>> 0).toString(36);
  }
  function migrateCard(c, fallbackTs){
    if (!c || typeof c !== "object") return null;
    const front = String(c.front || "");
    const back = String(c.back || "");
    return {
      id: c.id || ("c" + hashStr(front + "" + back)),
      front, back,
      updated: c.updated || fallbackTs || Date.now()
    };
  }
  // Tombstones only need to live long enough for every device to sync past the
  // deletion. After this window they're pruned so they can't accumulate forever.
  // Trade-off: a device offline longer than this may miss a deletion.
  const TOMB_TTL_MS = 90 * 24 * 60 * 60 * 1000;
  function pruneTomb(tomb, cutoff){
    if (!tomb) return;
    for (const id in tomb){ if ((tomb[id] || 0) < cutoff) delete tomb[id]; }
  }

  function migrateState(s){
    if (!s || !Array.isArray(s.decks)) return { decks: [], deckTomb: {} };
    const cutoff = Date.now() - TOMB_TTL_MS;
    s.decks.forEach(d => {
      if (!d) return;
      if (!Array.isArray(d.cards)) d.cards = [];
      const fb = d.updated || d.created || Date.now();
      const used = new Set();
      d.cards = d.cards.map(c => migrateCard(c, fb)).filter(Boolean).map(card => {
        // Disambiguate identical-content legacy cards so a later merge can't
        // collapse two real cards into one. Deterministic per position, so two
        // devices holding the same deck still agree on the ids.
        let id = card.id, n = 1;
        while (used.has(id)) id = card.id + "~" + (n++);
        used.add(id);
        card.id = id;
        return card;
      });
      if (!d.cardTomb || typeof d.cardTomb !== "object") d.cardTomb = {};
      pruneTomb(d.cardTomb, cutoff);
      if (!d.created) d.created = fb;
      if (!d.updated) d.updated = fb;
    });
    if (!s.deckTomb || typeof s.deckTomb !== "object") s.deckTomb = {};
    pruneTomb(s.deckTomb, cutoff);
    return s;
  }

  // Merge one deck that exists on both sides: union of cards by id (newer
  // 'updated' wins on conflict), with tombstones so a delete on one device
  // isn't undone by a stale copy on the other.
  function mergeOneDeck(ld, rd){
    const tomb = {};
    [ld.cardTomb, rd.cardTomb].forEach(t => {
      if (t) for (const id in t){ const ts = t[id] || 0; if (ts > (tomb[id] || 0)) tomb[id] = ts; }
    });
    const byId = new Map();
    (ld.cards || []).forEach(c => byId.set(c.id, c));
    (rd.cards || []).forEach(c => {
      const ex = byId.get(c.id);
      if (!ex || (c.updated || 0) >= (ex.updated || 0)) byId.set(c.id, c);
    });
    const cards = [];
    byId.forEach((card, id) => {
      const delTs = tomb[id] || 0;
      if (delTs > (card.updated || 0)) return;   // deletion is newer -> stays deleted
      if (id in tomb) delete tomb[id];           // edit beats an older delete -> revive
      cards.push(card);
    });
    const rdNewer = (rd.updated || 0) >= (ld.updated || 0);
    return {
      id: ld.id,
      name: rdNewer ? rd.name : ld.name,
      created: Math.min(ld.created || Date.now(), rd.created || Date.now()),
      updated: Math.max(ld.updated || 0, rd.updated || 0),
      cards,
      cardTomb: tomb
    };
  }
  // Both inputs must already be migrated. Merges decks card-by-card, and honours
  // deck-level tombstones so deleting a whole deck on one device isn't undone by
  // a stale copy on the other. Returns { decks, deckTomb }.
  function mergeStates(local, remote){
    const deckTomb = {};
    [local.deckTomb, remote.deckTomb].forEach(t => {
      if (t) for (const id in t){ const ts = t[id] || 0; if (ts > (deckTomb[id] || 0)) deckTomb[id] = ts; }
    });
    const localById = new Map((local.decks || []).map(d => [d.id, d]));
    const merged = [];
    const seen = new Set();
    const keep = (deck) => {
      const delTs = deckTomb[deck.id] || 0;
      if (delTs > (deck.updated || 0)) return;       // deck deletion is newer -> stays deleted
      if (deck.id in deckTomb) delete deckTomb[deck.id]; // deck edited after delete -> revive
      merged.push(deck);
    };
    (remote.decks || []).forEach(rd => {
      if (!rd || !rd.id || !Array.isArray(rd.cards)) return;
      seen.add(rd.id);
      const ld = localById.get(rd.id);
      keep(ld ? mergeOneDeck(ld, rd) : rd);
    });
    (local.decks || []).forEach(ld => { if (!seen.has(ld.id)) keep(ld); });
    return { decks: merged, deckTomb };
  }
  // Order-independent fingerprint of a whole state, used to tell whether a merge
  // actually changed anything (so Push can warn before pulling in remote edits).
  function stateSignature(st){
    return JSON.stringify({
      dtomb: st.deckTomb || {},
      decks: (st.decks || []).map(d => ({
        id: d.id, name: d.name, updated: d.updated, ctomb: d.cardTomb || {},
        cards: (d.cards || []).map(c => [c.id, c.updated, c.front, c.back])
                              .sort((a, b) => a[0] < b[0] ? -1 : 1)
      })).sort((a, b) => a.id < b.id ? -1 : 1)
    });
  }

  // --- DOM helpers ---
  const $ = (id) => document.getElementById(id);
  function show(viewId){
    ["view-decks","view-deck","view-play"].forEach(v => $(v).classList.toggle("hidden", v !== viewId));
    window.scrollTo(0,0);
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  // --- Toast ---
  let toastTimer;
  function toast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // --- Modal ---
  let modalResolve = null;
  function openModal({title, body, okText="OK", cancelText="Cancel", showCancel=true}){
    return new Promise(resolve => {
      $("modal-title").textContent = title;
      $("modal-body").innerHTML = body;
      $("modal-ok").textContent = okText;
      $("modal-ok").classList.toggle("btn-save-close", okText === "Save & Close");
      $("modal-cancel").textContent = cancelText;
      $("modal-cancel").style.display = showCancel ? "" : "none";
      $("modal").classList.add("show");
      modalResolve = resolve;
      // Autofocus first input
      setTimeout(() => {
        const first = $("modal-body").querySelector("input,textarea");
        if (first) first.focus();
      }, 50);
    });
  }
  function closeModal(result){
    $("modal").classList.remove("show");
    if (modalResolve){ const r = modalResolve; modalResolve = null; r(result); }
  }
  function collectAndClose(extra){
    const inputs = {};
    $("modal-body").querySelectorAll("[data-field]").forEach(el => {
      inputs[el.dataset.field] = el.value;
    });
    closeModal(Object.assign({ ok: true, values: inputs }, extra || {}));
  }
  $("modal-ok").addEventListener("click", () => collectAndClose());
  $("modal-cancel").addEventListener("click", () => closeModal({ ok: false }));
  let _modalDownOnOverlay = false;
  $("modal").addEventListener("pointerdown", (e) => {
    _modalDownOnOverlay = (e.target.id === "modal");
  });
  $("modal").addEventListener("click", (e) => {
    if (e.target.id === "modal" && _modalDownOnOverlay) closeModal({ ok: false });
  });
  $("modal-body").addEventListener("click", (e) => {
    const btn = e.target.closest('[data-action="add-another"]');
    if (btn) collectAndClose({ addAnother: true });
  });

  async function promptText({title, label, value="", placeholder="", multiline=false}){
    const id = "f_" + Math.random().toString(36).slice(2);
    const body = `
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin-bottom:6px;">${esc(label)}</label>
      ${multiline
        ? `<textarea data-field="${id}" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
        : `<input data-field="${id}" type="text" placeholder="${esc(placeholder)}" value="${esc(value)}">`}
    `;
    const result = await openModal({title, body});
    if (!result.ok) return null;
    return result.values[id];
  }

  async function promptCard({title, front="", back="", allowAddAnother=false}){
    const idF = "front_" + Math.random().toString(36).slice(2);
    const idB = "back_" + Math.random().toString(36).slice(2);
    const extra = allowAddAnother
      ? `<button class="add-another" data-action="add-another" type="button">+</button>`
      : "";
    const body = `
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin-bottom:6px;">Front</label>
      <textarea data-field="${idF}" placeholder="Question / prompt">${esc(front)}</textarea>
      <label style="font-size:13px;color:var(--surface-fg);display:block;margin:12px 0 6px;">Back</label>
      <textarea data-field="${idB}" placeholder="Answer">${esc(back)}</textarea>
      ${extra}
    `;
    const result = await openModal({title, body, okText:"Save & Close"});
    if (!result.ok) return null;
    return {
      front: result.values[idF].trim(),
      back: result.values[idB].trim(),
      addAnother: !!result.addAnother
    };
  }

  async function confirm(message){
    const body = `<div style="font-size:15px;color:var(--surface-fg);">${esc(message)}</div>`;
    const result = await openModal({title:"Confirm", body, okText:"Yes", cancelText:"Cancel"});
    return result.ok;
  }

  // --- Render: decks ---
  function renderDecks(){
    const list = $("deck-list");
    if (state.decks.length === 0){
      list.innerHTML = "";
      return;
    }
    list.innerHTML = state.decks.map((d, i) => `
      <div class="deck-card" data-id="${d.id}" data-idx="${i}">
        <div class="info" data-action="open">
          <div>${esc(d.name)}</div>
          <div class="meta">${d.cards.length} card${d.cards.length===1?"":"s"}</div>
        </div>
        <span class="pill" data-action="open">${d.cards.length}</span>
        <div class="reorder">
          <button class="btn-small reorder-btn" data-action="up"${i===0?" disabled":""}>▲</button>

  // --- Sync (encrypted GitHub Gist) ---
  const SYNC_KEY = "flashcards.sync.v1";
  function loadSync(){
    try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveSync(s){ localStorage.setItem(SYNC_KEY, JSON.stringify(s)); }

  function b64encode(bytes){
    let s = ""; for (let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function b64decode(str){
    const s = atob(str); const bytes = new Uint8Array(s.length);
    for (let i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(passphrase, salt){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  }

  async function encryptJSON(obj, passphrase){
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(passphrase, salt);
    const plaintext = new TextEncoder().encode(JSON.stringify(obj));
    const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
      { name: "AES-GCM", iv }, key, plaintext
    ));
    return {
      v: 1, alg: "AES-GCM/PBKDF2-SHA256-200k",
      salt: b64encode(salt), iv: b64encode(iv), data: b64encode(ciphertext)
    };
  }

  async function decryptJSON(envelope, passphrase){
    if (!envelope || envelope.v !== 1) throw new Error("Unknown format");
    const salt = b64decode(envelope.salt);
    const iv = b64decode(envelope.iv);
    const data = b64decode(envelope.data);
    const key = await deriveKey(passphrase, salt);
    const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
    return JSON.parse(new TextDecoder().decode(plaintext));
  }

  async function gistRequest(method, path, token, body){
    const res = await fetch("https://api.github.com" + path, {
      method,
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + token,
        "X-GitHub-Api-Version": "2022-11-28",
        ...(body ? {"Content-Type": "application/json"} : {})
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok){
      const text = await res.text();
      throw new Error(`GitHub ${res.status}: ${text.slice(0,200)}`);
    }
    return res.json();
  }

  const GIST_FILENAME = "flashcards.enc.json";

  // Download + decrypt the remote state. Returns the decrypted object, or
  // null if there's no gist / no data file yet. Throws on network/parse errors;
  // returns the sentinel "BAD_PASS" if the passphrase doesn't match.
  async function fetchRemoteState(cfg){
    if (!cfg.gistId) return null;
    const gist = await gistRequest("GET", `/gists/${cfg.gistId}`, cfg.token);
    const file = gist.files && gist.files[GIST_FILENAME];
    if (!file) return null;
    let content = file.content;
    if (file.truncated && file.raw_url){
      const r = await fetch(file.raw_url);
      content = await r.text();
    }
    const envelope = JSON.parse(content);
    try { return await decryptJSON(envelope, cfg.passphrase); }
    catch(e){ return "BAD_PASS"; }
  }

  // Guards against overlapping Push/Pull (e.g. double-taps) that could race or
  // create duplicate gists.
  let syncing = false;

  async function pushToGist(){
    if (syncing){ toast("Sync already running…"); return; }
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    syncing = true;
    try {
      // Safety net: never blindly overwrite the gist. Pull what's there, merge
      // it in, and warn if the remote had edits this device was about to clobber.
      if (cfg.gistId){
        toast("Checking remote…");
        let remote;
        try { remote = await fetchRemoteState(cfg); }
        catch(e){ remote = undefined; } // unreadable remote -> fall through and push
        if (remote === "BAD_PASS"){ toast("Wrong passphrase — push stopped"); return; }
        if (remote && Array.isArray(remote.decks)){
          migrateState(remote);
          const before = stateSignature(state);
          const mergedState = mergeStates(state, remote);
          if (stateSignature(mergedState) !== before){
            const ok = await confirm("The synced copy has changes this device doesn't have yet. Merge them in, then push? Nothing will be lost.");
            if (!ok){ toast("Push cancelled"); return; }
            state.decks = mergedState.decks;
            state.deckTomb = mergedState.deckTomb;
            saveState();
            renderDecks();
          }
        }
      }
      toast("Encrypting…");
      const envelope = await encryptJSON(state, cfg.passphrase);
      const content = JSON.stringify(envelope, null, 2);
      toast("Uploading…");
      let gist;
      if (cfg.gistId){
        gist = await gistRequest("PATCH", `/gists/${cfg.gistId}`, cfg.token, {
          files: { [GIST_FILENAME]: { content } }
        });
      } else {
        gist = await gistRequest("POST", `/gists`, cfg.token, {
          description: "flashcards (encrypted)",
          public: false,
          files: { [GIST_FILENAME]: { content } }
        });
        cfg.gistId = gist.id;
        saveSync(cfg);
      }
      toast("Pushed ✓");
    } catch(e){
      toast("Push failed: " + e.message.slice(0,60));
    } finally {
      syncing = false;
    }
  }

  async function pullFromGist(){
    if (syncing){ toast("Sync already running…"); return; }
    const cfg = loadSync();
    if (!cfg.token || !cfg.passphrase){ toast("Set up sync first"); return; }
    if (!cfg.gistId){ toast("No gist yet — push first"); return; }
    syncing = true;
    try {
      toast("Downloading…");
      const gist = await gistRequest("GET", `/gists/${cfg.gistId}`, cfg.token);
      const file = gist.files && gist.files[GIST_FILENAME];
      if (!file){ toast("Gist missing data file"); return; }
      let content = file.content;
      if (file.truncated && file.raw_url){
        const r = await fetch(file.raw_url);
        content = await r.text();
      }
      const envelope = JSON.parse(content);
      toast("Decrypting…");
      let remote;
      try { remote = await decryptJSON(envelope, cfg.passphrase); }
      catch(e){ toast("Wrong passphrase"); return; }
      if (!remote || !Array.isArray(remote.decks)){ toast("Bad remote data"); return; }
      migrateState(remote);
      const mergedState = mergeStates(state, remote);
      state.decks = mergedState.decks;
      state.deckTomb = mergedState.deckTomb;
      saveState();
      renderDecks();
      toast(`Pulled ✓ (${remote.decks.length} remote)`);
    } catch(e){
      toast("Pull failed: " + e.message.slice(0,60));
    } finally {
      syncing = false;
    }
  }

  function applyTheme(id){
    const t = THEMES[id];
    if (!t) return false;
    for (const [k, v] of Object.entries(t.vars)){
      document.documentElement.style.setProperty(k, v);
    }
    localStorage.setItem(THEME_KEY, id);
    // Cache the resolved colors so the inline <head> script can paint them
    // before the body renders next launch (avoids a flash of the default theme).
    try { localStorage.setItem("flashcards.themeVars.v1", JSON.stringify(t.vars)); } catch(e){}
    return true;
  }

  function currentThemeId(){
    return localStorage.getItem(THEME_KEY) || "flower";
  }

  async function openThemesMenu(){
    const current = currentThemeId();
    const rows = Object.entries(THEMES).map(([id, t]) =>
      `<button class="theme-row${id === current ? " theme-current" : ""}" data-theme-id="${esc(id)}">${esc(t.name)}${id === current ? "  ✓" : ""}</button>`
    ).join("");
    const body = `
      <div style="display:flex;flex-direction:column;gap:8px;">${rows}</div>
      <div style="color:var(--surface-fg);font-size:12px;margin-top:14px;line-height:1.4;opacity:0.85;">More themes coming soon. Your current theme is saved on this device.</div>
    `;
    const p = openModal({title:"Themes", body, okText:"Close", cancelText:"", showCancel:false});
    setTimeout(() => {
      document.querySelectorAll("[data-theme-id]").forEach(b => {
        b.onclick = () => {
          const id = b.dataset.themeId;
          applyTheme(id);
          closeModal({ok:true});
          toast("Applied " + THEMES[id].name);
        };
      });
    }, 60);
    await p;
  }

  $("btn-themes").addEventListener("click", openThemesMenu);

  // Apply saved theme on load (falls back to flower)
  applyTheme(currentThemeId());

  // --- Initial render ---
  renderDecks();
  show("view-decks");

  // Best-effort: ask the browser not to evict our cards. iOS may ignore this,
  // but on desktop/Android it meaningfully reduces the chance localStorage is
  // cleared after periods of disuse. Sync is still the real backup.
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persisted().then(already => {
      if (!already) navigator.storage.persist().catch(() => {});
    }).catch(() => {});
  }

  // Prevent iOS pinch-zoom interfering
  document.addEventListener("gesturestart", e => e.preventDefault());

  // Register service worker for offline use (only when served over http/https)
  if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
